name: Skill change
description: Request a shared skill addition, update, or removal
title: "[skills] "
labels:
  - repo:skills
  - status:triage
  - ai:codex
  - safety:ordinary
body:
  - type: markdown
    attributes:
      value: |
        Use this template for changes to shared skills used by Codex, Claude Code, or Antigravity.
        Link the controlling HCOS Issue when the change affects an application or operational rule.
  - type: input
    id: hcos_issue
    attributes:
      label: Linked HCOS Issue
      description: HealthCheck-OS Issue URL or number, if this is tracked from HCOS.
      placeholder: "akaza-lab-org/HealthCheck-OS#123"
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change and why?
    validations:
      required: true
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - New skill
        - Skill update
        - Skill removal
        - Automation/setup change
        - Documentation only
    validations:
      required: true
  - type: textarea
    id: affected_skills
    attributes:
      label: Affected skills or files
      description: List paths such as agent/example-skill/SKILL.md.
  - type: textarea
    id: downstream
    attributes:
      label: Downstream impact
      description: Which applications, agents, or terminals may need re-sync?
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: No PHI, patient identifiers, production logs, or secrets are included.
          required: true
        - label: Any medical workflow, EMR/AHK, or production deployment impact is tracked in HCOS.
          required: false
