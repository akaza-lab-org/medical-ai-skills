name: Issue triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure HCOS advisory labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "repo:skills", color: "2ca02c", description: "Work primarily in the shared skills repository" },
              { name: "ai:codex", color: "0366d6", description: "Codex should implement or verify" },
              { name: "ai:claude", color: "5319e7", description: "Claude should design or review" },
              { name: "ai:human-review", color: "b60205", description: "Human CTO decision or review required" },
              { name: "status:triage", color: "c5def5", description: "Needs classification before implementation" },
              { name: "status:ready", color: "0e8a16", description: "Approved and ready for implementation" },
              { name: "status:in-progress", color: "1d76db", description: "Work is actively in progress" },
              { name: "status:review", color: "fbca04", description: "Waiting for review or verification" },
              { name: "status:blocked", color: "e11d21", description: "Blocked by decision or dependency" },
              { name: "safety:ordinary", color: "c2e0c6", description: "Routine docs or low-risk tooling work" },
              { name: "safety:deployment", color: "fef2c0", description: "Deployment, terminal setup, or sync risk" },
              { name: "safety:emr-ahk", color: "d4c5f9", description: "EMR or AHK execution-flow risk" },
              { name: "review:claude", color: "8250df", description: "Claude architecture and safety review requested" }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              }
            }
      - name: Apply advisory triage labels and comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue || issue.pull_request) return;

            const rawText = `${issue.title || ""}\n${issue.body || ""}`.toLowerCase();
            const text = rawText
              .replace(/no phi[^\n]*/g, "")
              .replace(/no patient (data|identifiers?)[^\n]*/g, "")
              .replace(/no production (logs?|deployment)[^\n]*/g, "")
              .replace(/no (secrets?|credentials?)[^\n]*/g, "")
              .replace(/no (screenshots?|external (transmission|ai))[^\n]*/g, "")
              .replace(/are (not )?included[^\n]*/g, "");
            const labels = new Set(["repo:skills"]);
            const has = (...patterns) => patterns.some((p) => text.includes(p.toLowerCase()));

            let ai = "ai:codex";
            if (has("architecture", "design", "review", "設計", "レビュー")) ai = "ai:claude";

            let safety = "safety:ordinary";
            if (has("setup", "sync", "junction", "terminal", "deployment", "配布", "端末", "同期")) safety = "safety:deployment";
            if (has("emr", "ahk", "電子カルテ", "send keys", "config.ini")) safety = "safety:emr-ahk";

            const humanDecisionNeeded = has(
              "human decision",
              "medical workflow",
              "production deployment",
              "emr",
              "ahk",
              "patient data",
              "secret",
              "credential"
            );

            const currentLabels = (issue.labels || []).map((l) => (typeof l === "string" ? l : l.name));
            const preservedStates = ["status:ready", "status:in-progress", "status:review"];
            const existingState = currentLabels.find((label) => preservedStates.includes(label));

            let status = existingState || "status:triage";
            if (humanDecisionNeeded) {
              status = "status:blocked";
              ai = "ai:human-review";
            }

            labels.add(ai);
            labels.add(safety);
            labels.add(status);

            const queuePrefixes = ["repo:", "ai:", "status:", "safety:"];
            for (const existing of issue.labels || []) {
              const name = typeof existing === "string" ? existing : existing.name;
              if (name && queuePrefixes.some((prefix) => name.startsWith(prefix)) && !labels.has(name)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: Array.from(labels),
            });

            const marker = "<!-- hcos-ai-triage -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existingTriageComment = comments.find((comment) => comment.body && comment.body.includes(marker));

            const body = [
              marker,
              "AI Task Queue triage:",
              "",
              `- Suggested owner: ${ai.replace("ai:", "")}`,
              `- Safety level: ${safety.replace("safety:", "")}`,
              `- Status: ${status.replace("status:", "")}`,
              `- Next action: ${status === "status:blocked" ? "confirm HCOS scope and Human CTO approval before implementation." : "confirm scope, then move to status:ready when approved."}`,
            ].join("\n");

            if (existingTriageComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingTriageComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            }
